# ==========================
# 1. CORE SETTINGS
# ==========================

# Fix colors for modern terminals (Alacritty/Kitty/WezTerm)
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable Mouse (scrolling, clicking panes)
set -g mouse on

# Set Prefix to Ctrl+Space (Easier to hit than Ctrl+b, doesn't conflict with i3 Mod)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==========================
# 2. VIM MODE & NAVIGATION
# ==========================

# Enable Vi mode
set-window-option -g mode-keys vi

# Keybindings for copy-paste (mimic Vim)
# 'v' to begin selection, 'y' to yank
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory (instead of home)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ==========================
# 3. PLUGINS (THE RICE)
# ==========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# INTEGRATION: Vim-Tmux Navigator
# Allows Ctrl+h/j/k/l to switch seamlessly between Vim splits and Tmux panes
set -g @plugin 'christoomey/vim-tmux-navigator'

# AESTHETICS: Catppuccin Theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha' # latte, frappe, macchiato or mocha

# Theme Customization
set -g @catppuccin_window_right_separator "█ "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_middle_separator " | "
set -g @catppuccin_window_default_fill "none"
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_status_modules_right "application session user host date_time"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M:%S"

# Place status bar on top (Great for i3 users with bottom bars)
set-option -g status-position top
# Add this to your ~/.tmux.conf
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:Tc"

# ==========================
# 4. INITIALIZE TPM
# ==========================
# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'
