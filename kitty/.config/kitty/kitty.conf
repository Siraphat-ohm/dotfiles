# ==========================
# 1. FONTS (Essential for Icons)
# ==========================
# You must install a Nerd Font for the Tmux status bar icons to render.
# Arch: sudo pacman -S ttf-jetbrains-mono-nerd
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# ==========================
# 2. WINDOW PADDING (For i3 Aesthetics)
# ==========================
# Adds breathing room between the window border and text
window_padding_width 10
hide_window_decorations yes

# ==========================
# 3. COLOR THEME (Catppuccin Mocha)
# ==========================
# Matches the Tmux theme exactly
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# The 16 Terminal Colors
# black
color0 #45475A
color8 #585B70
# red
color1 #F38BA8
color9 #F38BA8
# green
color2  #A6E3A1
color10 #A6E3A1
# yellow
